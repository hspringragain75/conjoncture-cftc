name: Update Economic Data
on:
  schedule:
    # 5h UTC = 7h Paris en été (CEST = UTC+2) à partir du 30 mars
    # En hiver (CET = UTC+1), ce sera 6h Paris — acceptable
    - cron: '0 5 * * 1-5'
  workflow_dispatch:
    # Declenchement manuel avec option de diagnostic RSS
    inputs:
      mode:
        description: 'Mode de lancement'
        required: false
        default: 'normal'
        type: choice
        options:
          - normal
          - diagnostic_rss
  push:
    branches: [main]

jobs:
  update-data:
    runs-on: ubuntu-latest
    # Ne pas tourner en mode diagnostic_rss (job dédié ci-dessous)
    if: ${{ github.event.inputs.mode != 'diagnostic_rss' }}
    # Secrets PISTE pour l'API Légifrance (mise à jour grilles conventionnelles)
    env:
      PISTE_CLIENT_ID: ${{ secrets.PISTE_CLIENT_ID }}
      PISTE_CLIENT_SECRET: ${{ secrets.PISTE_CLIENT_SECRET }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Installation des dépendances Python
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install feedparser requests

      # Etape 1 : Recuperer les donnees economiques (INSEE, etc.) + flux RSS
      - name: Fetch latest economic data
        run: python scripts/fetch_data.py

      # Etape 2 : Generer les previsions CFTC
      - name: Generate CFTC predictions
        run: python scripts/predictions_model_v4.py public/data.json

      # Etape 3 : Commit et push si changements
      - name: Commit and push if changed
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add -A
          if git diff --staged --quiet; then
            echo "Pas de changements a commit"
          else
            git commit -m "📊 Mise a jour donnees + previsions $(date +'%Y-%m-%d %H:%M')"
            git push --force-with-lease origin main || git push --force origin main
          fi

  build-deploy:
    needs: update-data
    runs-on: ubuntu-latest
    steps:
      - name: Checkout updated repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          commit_message: "🚀 Deploy $(date +'%Y-%m-%d %H:%M')"

  # ── Job diagnostic RSS ── déclenché uniquement en mode manuel "diagnostic_rss"
  diagnostic-rss:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.mode == 'diagnostic_rss' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install feedparser requests

      - name: Run RSS diagnostic
        run: python scripts/test_rss.py

      # Les résultats s'affichent dans les logs GitHub Actions
      # Actions > diagnostic-rss > Run RSS diagnostic
