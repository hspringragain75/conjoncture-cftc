name: Test PISTE API

on:
  workflow_dispatch:  # déclenchement manuel uniquement

jobs:
  test-piste:
    runs-on: ubuntu-latest
    steps:
      - name: Test filtres corrects
        env:
          PISTE_CLIENT_ID: ${{ secrets.PISTE_CLIENT_ID }}
          PISTE_CLIENT_SECRET: ${{ secrets.PISTE_CLIENT_SECRET }}
        run: |
          python3 - << 'EOF'
          import urllib.request, urllib.parse, json, os

          data = urllib.parse.urlencode({
              "grant_type": "client_credentials",
              "client_id": os.environ["PISTE_CLIENT_ID"],
              "client_secret": os.environ["PISTE_CLIENT_SECRET"],
              "scope": "openid",
          }).encode()
          with urllib.request.urlopen(
              urllib.request.Request(
                  "https://oauth.piste.gouv.fr/api/oauth/token",
                  data=data,
                  headers={"Content-Type": "application/x-www-form-urlencoded"}
              ), timeout=15
          ) as r:
              token = json.loads(r.read())["access_token"]
          print("✅ Token OK")

          BASE = "https://api.piste.gouv.fr/dila/legifrance/lf-engine-app"
          headers = {
              "Authorization": f"Bearer {token}",
              "Content-Type": "application/json",
              "Accept": "application/json",
          }

          def post(endpoint, payload):
              req = urllib.request.Request(
                  f"{BASE}{endpoint}",
                  data=json.dumps(payload).encode(),
                  headers=headers
              )
              try:
                  with urllib.request.urlopen(req, timeout=20) as r:
                      return json.loads(r.read()), None
              except urllib.error.HTTPError as e:
                  return None, f"HTTP {e.code}: {e.read().decode()[:200]}"
              except Exception as e:
                  return None, str(e)

          # Les facetElem corrects sont TEXTE_BASE et LEGAL_STATUS
          tests = [
              # Textes de base uniquement (1495 attendus)
              ("TEXTE_BASE seul", [
                  {"facette": "TEXTE_BASE", "valeur": "TEXTE_BASE"}
              ]),
              # Textes de base EN VIGUEUR
              ("TEXTE_BASE + VIGUEUR_ETEN", [
                  {"facette": "TEXTE_BASE", "valeur": "TEXTE_BASE"},
                  {"facette": "LEGAL_STATUS", "valeur": "VIGUEUR_ETEN"},
              ]),
              # Textes de base EN VIGUEUR ou VIGUEUR_NON_ETEN
              ("TEXTE_BASE + VIGUEUR", [
                  {"facette": "TEXTE_BASE", "valeur": "TEXTE_BASE"},
                  {"facette": "LEGAL_STATUS", "valeur": "VIGUEUR"},
              ]),
          ]

          for label, filtres in tests:
              result, err = post("/search", {
                  "fond": "KALI",
                  "recherche": {
                      "champs": [],
                      "filtres": filtres,
                      "operateur": "ET",
                      "pageNumber": 1,
                      "pageSize": 3,
                      "sort": "PERTINENCE",
                      "typePagination": "DEFAUT",
                      "fromAdvancedRecherche": False
                  }
              })
              if result:
                  total = result.get("totalResultNumber")
                  print(f"\n✅ {label}: total={total}")
                  for r in (result.get("results") or [])[:2]:
                      t = (r.get("titles") or [{}])[0]
                      print(f"   {t.get('id')} — {t.get('title','')[:70]}")
                  # Afficher tous les champs du premier résultat
                  if result.get("results"):
                      print(f"   Champs dispo: {list(result['results'][0].keys())}")
              else:
                  print(f"❌ {label}: {err[:120]}")
          EOF
