name: Test PISTE API

on:
  workflow_dispatch:  # déclenchement manuel uniquement

jobs:
  test-piste:
    runs-on: ubuntu-latest
    steps:
      - name: Test stratégie IDCC pagination
        env:
          PISTE_CLIENT_ID: ${{ secrets.PISTE_CLIENT_ID }}
          PISTE_CLIENT_SECRET: ${{ secrets.PISTE_CLIENT_SECRET }}
        run: |
          python3 - << 'EOF'
          import urllib.request, urllib.parse, json, os, re

          data = urllib.parse.urlencode({
              "grant_type": "client_credentials",
              "client_id": os.environ["PISTE_CLIENT_ID"],
              "client_secret": os.environ["PISTE_CLIENT_SECRET"],
              "scope": "openid",
          }).encode()
          with urllib.request.urlopen(
              urllib.request.Request(
                  "https://oauth.piste.gouv.fr/api/oauth/token",
                  data=data,
                  headers={"Content-Type": "application/x-www-form-urlencoded"}
              ), timeout=15
          ) as r:
              token = json.loads(r.read())["access_token"]

          BASE = "https://api.piste.gouv.fr/dila/legifrance/lf-engine-app"
          H = {
              "Authorization": f"Bearer {token}",
              "Content-Type": "application/json",
              "Accept": "application/json",
          }

          def post(endpoint, payload):
              req = urllib.request.Request(
                  f"{BASE}{endpoint}",
                  data=json.dumps(payload).encode(),
                  headers=H
              )
              with urllib.request.urlopen(req, timeout=20) as r:
                  return json.loads(r.read())

          # 1. Chercher avec IDCC sans valeur — combien de résultats ?
          # et est-ce que les résultats ont idcc rempli ?
          for valeur in ["", "*", "0", "convention"]:
              try:
                  s = post("/search", {
                      "fond": "KALI",
                      "recherche": {
                          "champs": [{
                              "typeChamp": "IDCC",
                              "criteres": [{
                                  "typeRecherche": "TOUS_LES_MOTS_DANS_UN_CHAMP",
                                  "valeur": valeur,
                                  "operateur": "ET"
                              }],
                              "operateur": "ET"
                          }],
                          "operateur": "ET",
                          "pageNumber": 1, "pageSize": 5,
                          "sort": "PERTINENCE",
                          "typePagination": "DEFAUT",
                          "fromAdvancedRecherche": False
                      }
                  })
                  total = s.get("totalResultNumber")
                  results = s.get("results") or []
                  idccs = [r.get("idcc") for r in results]
                  print(f"IDCC valeur={valeur!r}: total={total} idccs={idccs[:3]}")
                  if results:
                      # Chercher conteneurs dans le premier résultat via kaliText
                      first_id = (results[0].get("titles") or [{}])[0].get("id")
                      if first_id:
                          try:
                              kt = post("/consult/kaliText", {"id": first_id})
                              conteneurs = kt.get("conteneurs") or []
                              print(f"  → conteneurs du 1er: {conteneurs[:2]}")
                          except:
                              pass
              except Exception as e:
                  print(f"IDCC valeur={valeur!r}: erreur {e}")

          # 2. Test avec pageSize=100 sur IDCC=1 (tous les IDCCs commençant par 1)
          # pour voir si on peut paginer efficacement
          s = post("/search", {
              "fond": "KALI",
              "recherche": {
                  "champs": [{
                      "typeChamp": "IDCC",
                      "criteres": [{
                          "typeRecherche": "TOUS_LES_MOTS_DANS_UN_CHAMP",
                          "valeur": "1",
                          "operateur": "ET"
                      }],
                      "operateur": "ET"
                  }],
                  "operateur": "ET",
                  "pageNumber": 1, "pageSize": 100,
                  "sort": "PERTINENCE",
                  "typePagination": "DEFAUT",
                  "fromAdvancedRecherche": False
              }
          })
          total = s.get("totalResultNumber", 0)
          results = s.get("results") or []
          # Extraire les IDCC uniques depuis idcc field
          idccs_uniques = set()
          for r in results:
              v = r.get("idcc")
              if v:
                  idccs_uniques.add(str(v))
          print(f"\nIDCC=1: total={total} nb_résultats={len(results)} idccs_uniques={sorted(idccs_uniques)[:10]}")
          EOF
