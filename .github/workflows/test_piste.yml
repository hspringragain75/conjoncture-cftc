name: Test PISTE API

on:
  workflow_dispatch:  # déclenchement manuel uniquement

jobs:
  test-piste:
    runs-on: ubuntu-latest
    steps:
      - name: Test endpoints conteneurs KALI
        env:
          PISTE_CLIENT_ID: ${{ secrets.PISTE_CLIENT_ID }}
          PISTE_CLIENT_SECRET: ${{ secrets.PISTE_CLIENT_SECRET }}
        run: |
          python3 - << 'EOF'
          import urllib.request, urllib.parse, json, os

          data = urllib.parse.urlencode({
              "grant_type": "client_credentials",
              "client_id": os.environ["PISTE_CLIENT_ID"],
              "client_secret": os.environ["PISTE_CLIENT_SECRET"],
              "scope": "openid",
          }).encode()
          with urllib.request.urlopen(
              urllib.request.Request(
                  "https://oauth.piste.gouv.fr/api/oauth/token",
                  data=data,
                  headers={"Content-Type": "application/x-www-form-urlencoded"}
              ), timeout=15
          ) as r:
              token = json.loads(r.read())["access_token"]

          BASE = "https://api.piste.gouv.fr/dila/legifrance/lf-engine-app"
          H = {
              "Authorization": f"Bearer {token}",
              "Content-Type": "application/json",
              "Accept": "application/json",
          }

          def post(endpoint, payload):
              req = urllib.request.Request(
                  f"{BASE}{endpoint}",
                  data=json.dumps(payload).encode(),
                  headers=H
              )
              try:
                  with urllib.request.urlopen(req, timeout=20) as r:
                      return json.loads(r.read()), None
              except urllib.error.HTTPError as e:
                  return None, f"HTTP {e.code}: {e.read().decode()[:150]}"
              except Exception as e:
                  return None, str(e)

          # Endpoints à tester pour les conteneurs KALI
          tests = [
              ("/consult/kaliCont",       {"id": "KALICONT000005635173"}),
              ("/consult/kaliContByNum",  {"num": "1486"}),
              ("/consult/getConventionCollective", {"id": "KALICONT000005635173"}),
              ("/list/kaliCont",          {"pageNumber": 1, "pageSize": 5}),
              ("/list/kaliContByActivite",{"pageNumber": 1, "pageSize": 5}),
              ("/consult/kali",           {"id": "KALICONT000005635173", "nature": "IDCC"}),
              ("/consult/kaliText",       {"id": "KALITEXT000005679895"}),
          ]

          for endpoint, payload in tests:
              result, err = post(endpoint, payload)
              if result:
                  print(f"✅ {endpoint}: clés={list(result.keys())[:6]}")
                  # Chercher idcc/num dans la réponse
                  txt = json.dumps(result, ensure_ascii=False)
                  import re
                  nums = re.findall(r'"num"\s*:\s*"?(\d{3,4})"?', txt)
                  if nums:
                      print(f"   num/idcc trouvé: {nums[:3]}")
              else:
                  print(f"❌ {endpoint}: {err[:100]}")
          EOF
