name: Test PISTE API

on:
  workflow_dispatch:  # déclenchement manuel uniquement

jobs:
  test-piste:
    runs-on: ubuntu-latest
    steps:
      - name: Inspecter champs idcc etat conforme
        env:
          PISTE_CLIENT_ID: ${{ secrets.PISTE_CLIENT_ID }}
          PISTE_CLIENT_SECRET: ${{ secrets.PISTE_CLIENT_SECRET }}
        run: |
          python3 - << 'EOF'
          import urllib.request, urllib.parse, json, os

          data = urllib.parse.urlencode({
              "grant_type": "client_credentials",
              "client_id": os.environ["PISTE_CLIENT_ID"],
              "client_secret": os.environ["PISTE_CLIENT_SECRET"],
              "scope": "openid",
          }).encode()
          with urllib.request.urlopen(
              urllib.request.Request(
                  "https://oauth.piste.gouv.fr/api/oauth/token",
                  data=data,
                  headers={"Content-Type": "application/x-www-form-urlencoded"}
              ), timeout=15
          ) as r:
              token = json.loads(r.read())["access_token"]

          BASE = "https://api.piste.gouv.fr/dila/legifrance/lf-engine-app"
          headers = {
              "Authorization": f"Bearer {token}",
              "Content-Type": "application/json",
              "Accept": "application/json",
          }

          # Chercher "convention collective nationale" dans le titre
          # pour cibler uniquement les CCN et pas les avenants
          payload = {
              "fond": "KALI",
              "recherche": {
                  "champs": [{
                      "typeChamp": "TITRE",
                      "criteres": [{
                          "typeRecherche": "EXACTE",
                          "valeur": "convention collective nationale",
                          "operateur": "ET"
                      }],
                      "operateur": "ET"
                  }],
                  "operateur": "ET",
                  "pageNumber": 1,
                  "pageSize": 10,
                  "sort": "PERTINENCE",
                  "typePagination": "DEFAUT",
                  "fromAdvancedRecherche": False
              }
          }

          req = urllib.request.Request(
              f"{BASE}/search",
              data=json.dumps(payload).encode(),
              headers=headers
          )
          with urllib.request.urlopen(req, timeout=20) as r:
              result = json.loads(r.read())

          print(f"Total 'convention collective nationale' dans titre: {result.get('totalResultNumber')}")
          print()
          for item in (result.get("results") or []):
              t = (item.get("titles") or [{}])[0]
              print(f"id={t.get('id')} etat={item.get('etat')} idcc={item.get('idcc')} conforme={item.get('conforme')}")
              print(f"  titre: {t.get('title','')[:80]}")
          EOF
