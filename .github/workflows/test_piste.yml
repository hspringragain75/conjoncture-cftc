name: Test PISTE API

on:
  workflow_dispatch:  # déclenchement manuel uniquement

jobs:
  test-piste:
    runs-on: ubuntu-latest
    steps:
      - name: Test collecte KALICONT via search
        env:
          PISTE_CLIENT_ID: ${{ secrets.PISTE_CLIENT_ID }}
          PISTE_CLIENT_SECRET: ${{ secrets.PISTE_CLIENT_SECRET }}
        run: |
          python3 - << 'EOF'
          import urllib.request, urllib.parse, json, os, time

          data = urllib.parse.urlencode({
              "grant_type": "client_credentials",
              "client_id": os.environ["PISTE_CLIENT_ID"],
              "client_secret": os.environ["PISTE_CLIENT_SECRET"],
              "scope": "openid",
          }).encode()
          with urllib.request.urlopen(
              urllib.request.Request(
                  "https://oauth.piste.gouv.fr/api/oauth/token",
                  data=data,
                  headers={"Content-Type": "application/x-www-form-urlencoded"}
              ), timeout=15
          ) as r:
              token = json.loads(r.read())["access_token"]

          BASE = "https://api.piste.gouv.fr/dila/legifrance/lf-engine-app"
          H = {
              "Authorization": f"Bearer {token}",
              "Content-Type": "application/json",
              "Accept": "application/json",
          }

          def post(endpoint, payload):
              req = urllib.request.Request(
                  f"{BASE}{endpoint}",
                  data=json.dumps(payload).encode(),
                  headers=H
              )
              with urllib.request.urlopen(req, timeout=20) as r:
                  return json.loads(r.read())

          # Paginer /search et appeler /consult/kaliText sur chaque résultat
          # pour extraire les KALICONT uniques
          kalicont_uniques = {}  # cid -> {num, titre}
          total_appels = 0
          NB_PAGES = 5  # test sur 5 pages = 500 textes

          for page in range(1, NB_PAGES + 1):
              search = post("/search", {
                  "fond": "KALI",
                  "recherche": {
                      "champs": [],
                      "operateur": "ET",
                      "pageNumber": page,
                      "pageSize": 100,
                      "sort": "PERTINENCE",
                      "typePagination": "DEFAUT",
                      "fromAdvancedRecherche": False
                  }
              })
              results = search.get("results") or []
              print(f"Page {page}: {len(results)} résultats")

              for item in results:
                  kalitext_id = (item.get("titles") or [{}])[0].get("id")
                  if not kalitext_id:
                      continue
                  etat = item.get("etat", "")
                  if etat not in ("VIGUEUR_ETEN", "VIGUEUR", "VIGUEUR_NON_ETEN"):
                      continue
                  try:
                      kt = post("/consult/kaliText", {"id": kalitext_id})
                      total_appels += 1
                      for cont in (kt.get("conteneurs") or []):
                          cid = cont.get("cid")
                          num = cont.get("num") or cont.get("numero", "")
                          titre = cont.get("titre") or ""
                          if cid and cid not in kalicont_uniques:
                              kalicont_uniques[cid] = {
                                  "cid": cid,
                                  "num": str(num).lstrip("0") or num,
                                  "titre": titre[:80]
                              }
                  except Exception as e:
                      pass
              time.sleep(0.2)

          print(f"\n✅ {len(kalicont_uniques)} KALICONT uniques trouvés en {NB_PAGES} pages ({total_appels} appels kaliText)")
          for k in list(kalicont_uniques.values())[:10]:
              print(f"  IDCC {k['num']:>6} — {k['titre'][:70]}")
          EOF
