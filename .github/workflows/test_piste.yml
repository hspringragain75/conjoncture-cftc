name: Test PISTE API

on:
  workflow_dispatch:  # déclenchement manuel uniquement

jobs:
  test-piste:
    runs-on: ubuntu-latest
    steps:
      - name: Test filtres KALI
        env:
          PISTE_CLIENT_ID: ${{ secrets.PISTE_CLIENT_ID }}
          PISTE_CLIENT_SECRET: ${{ secrets.PISTE_CLIENT_SECRET }}
        run: |
          python3 - << 'EOF'
          import urllib.request, urllib.parse, json, os, re

          data = urllib.parse.urlencode({
              "grant_type": "client_credentials",
              "client_id": os.environ["PISTE_CLIENT_ID"],
              "client_secret": os.environ["PISTE_CLIENT_SECRET"],
              "scope": "openid",
          }).encode()
          with urllib.request.urlopen(
              urllib.request.Request(
                  "https://oauth.piste.gouv.fr/api/oauth/token",
                  data=data,
                  headers={"Content-Type": "application/x-www-form-urlencoded"}
              ), timeout=15
          ) as r:
              token = json.loads(r.read())["access_token"]
          print("✅ Token OK")

          BASE = "https://api.piste.gouv.fr/dila/legifrance/lf-engine-app"
          headers = {
              "Authorization": f"Bearer {token}",
              "Content-Type": "application/json",
              "Accept": "application/json",
          }

          def post(endpoint, payload):
              req = urllib.request.Request(
                  f"{BASE}{endpoint}",
                  data=json.dumps(payload).encode(),
                  headers=headers
              )
              try:
                  with urllib.request.urlopen(req, timeout=20) as r:
                      return json.loads(r.read()), None
              except urllib.error.HTTPError as e:
                  return None, f"HTTP {e.code}: {e.read().decode()[:150]}"
              except Exception as e:
                  return None, str(e)

          # 1. Facettes disponibles
          result, err = post("/search", {
              "fond": "KALI",
              "recherche": {
                  "champs": [],
                  "operateur": "ET",
                  "pageNumber": 1,
                  "pageSize": 1,
                  "sort": "PERTINENCE",
                  "typePagination": "DEFAUT",
                  "fromAdvancedRecherche": False
              }
          })
          if result:
              print(f"\n📊 Facettes KALI:")
              for facet in (result.get("facets") or []):
                  name = facet.get("name", "?")
                  values = facet.get("values") or []
                  if isinstance(values, list):
                      vals = [v.get("value") for v in values[:5]]
                  else:
                      vals = str(values)[:100]
                  print(f"  {name}: {vals}")
          else:
              print(f"❌ facettes: {err}")

          # 2. Tester différentes natures
          for nature_val in ["IDCC", "CCN", "CONVENTION_COLLECTIVE", "KALICONT"]:
              result, err = post("/search", {
                  "fond": "KALI",
                  "recherche": {
                      "champs": [],
                      "filtres": [{"facette": "NATURE", "valeur": nature_val}],
                      "operateur": "ET",
                      "pageNumber": 1,
                      "pageSize": 3,
                      "sort": "PERTINENCE",
                      "typePagination": "DEFAUT",
                      "fromAdvancedRecherche": False
                  }
              })
              if result:
                  print(f"\n✅ NATURE={nature_val}: total={result.get('totalResultNumber')}")
                  if result.get("results"):
                      t = (result["results"][0].get("titles") or [{}])[0]
                      print(f"   ex: {t.get('id')} — {t.get('title','')[:60]}")
              else:
                  print(f"❌ NATURE={nature_val}: {err[:80]}")

          # 3. /list/kali
          result, err = post("/list/kali", {"pageNumber": 1, "pageSize": 5})
          if result:
              print(f"\n✅ /list/kali: clés={list(result.keys())} total={result.get('totalResultNumber')}")
          else:
              print(f"❌ /list/kali: {err[:120]}")

          # 4. /consult/kali avec SYNTEC
          result, err = post("/consult/kali", {"id": "KALICONT000005635173"})
          if result:
              print(f"\n✅ /consult/kali SYNTEC: clés={list(result.keys())[:8]}")
              idcc = re.findall(r'"num"\s*:\s*"?(\d{3,4})"?', json.dumps(result))
              print(f"   IDCC trouvé: {idcc[:3]}")
          else:
              print(f"❌ /consult/kali: {err[:120]}")
          EOF
