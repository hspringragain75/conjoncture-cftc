name: Test PISTE API

on:
  workflow_dispatch:  # déclenchement manuel uniquement

jobs:
  test-piste:
    runs-on: ubuntu-latest
    steps:
      - name: Test stratégie finale
        env:
          PISTE_CLIENT_ID: ${{ secrets.PISTE_CLIENT_ID }}
          PISTE_CLIENT_SECRET: ${{ secrets.PISTE_CLIENT_SECRET }}
        run: |
          python3 - << 'EOF'
          import urllib.request, urllib.parse, json, os, re

          data = urllib.parse.urlencode({
              "grant_type": "client_credentials",
              "client_id": os.environ["PISTE_CLIENT_ID"],
              "client_secret": os.environ["PISTE_CLIENT_SECRET"],
              "scope": "openid",
          }).encode()
          with urllib.request.urlopen(
              urllib.request.Request(
                  "https://oauth.piste.gouv.fr/api/oauth/token",
                  data=data,
                  headers={"Content-Type": "application/x-www-form-urlencoded"}
              ), timeout=15
          ) as r:
              token = json.loads(r.read())["access_token"]

          BASE = "https://api.piste.gouv.fr/dila/legifrance/lf-engine-app"
          H = {
              "Authorization": f"Bearer {token}",
              "Content-Type": "application/json",
              "Accept": "application/json",
          }

          def post(endpoint, payload):
              req = urllib.request.Request(
                  f"{BASE}{endpoint}",
                  data=json.dumps(payload).encode(),
                  headers=H
              )
              with urllib.request.urlopen(req, timeout=20) as r:
                  return json.loads(r.read())

          # 1. kaliText SYNTEC : voir le champ conteneurs
          txt = post("/consult/kaliText", {"id": "KALITEXT000005679895"})
          print(f"conteneurs dans kaliText: {txt.get('conteneurs')}")

          # 2. kaliCont SYNTEC complet : voir num, titre, sections de premier niveau
          cont = post("/consult/kaliCont", {"id": "KALICONT000005635173"})
          print(f"\n/consult/kaliCont SYNTEC:")
          print(f"  num={cont.get('num')} titre={cont.get('titre','')[:60]}")
          print(f"  clés: {list(cont.keys())}")
          # Sections de premier niveau = structure de la CCN
          sections = cont.get('sections') or []
          print(f"  nb sections: {len(sections)}")
          if sections:
              print(f"  1ère section: {sections[0].get('title','')[:60]}")

          # 3. Stratégie : /search retourne les KALITEXT avec idcc dans certains cas ?
          # Tester en cherchant un IDCC connu dans le champ num
          search = post("/search", {
              "fond": "KALI",
              "recherche": {
                  "champs": [{
                      "typeChamp": "NUM_AFFAIRE",
                      "criteres": [{
                          "typeRecherche": "TOUS_LES_MOTS_DANS_UN_CHAMP",
                          "valeur": "1486",
                          "operateur": "ET"
                      }],
                      "operateur": "ET"
                  }],
                  "operateur": "ET",
                  "pageNumber": 1,
                  "pageSize": 5,
                  "sort": "PERTINENCE",
                  "typePagination": "DEFAUT",
                  "fromAdvancedRecherche": False
              }
          })
          print(f"\nRecherche NUM_AFFAIRE=1486: total={search.get('totalResultNumber')}")
          for item in (search.get("results") or [])[:3]:
              t = (item.get("titles") or [{}])[0]
              print(f"  idcc={item.get('idcc')} id={t.get('id','')[:25]} titre={t.get('title','')[:50]}")

          # 4. Tester champ NOR
          for champ in ["NOR", "IDCC", "NUM_CONVENTION"]:
              try:
                  s = post("/search", {
                      "fond": "KALI",
                      "recherche": {
                          "champs": [{
                              "typeChamp": champ,
                              "criteres": [{
                                  "typeRecherche": "TOUS_LES_MOTS_DANS_UN_CHAMP",
                                  "valeur": "1486",
                                  "operateur": "ET"
                              }],
                              "operateur": "ET"
                          }],
                          "operateur": "ET",
                          "pageNumber": 1, "pageSize": 3,
                          "sort": "PERTINENCE",
                          "typePagination": "DEFAUT",
                          "fromAdvancedRecherche": False
                      }
                  })
                  print(f"  {champ}=1486: total={s.get('totalResultNumber')} idcc_ex={[(r.get('idcc')) for r in s.get('results',[])[:2]]}")
              except Exception as e:
                  print(f"  {champ}: erreur {e}")
          EOF
