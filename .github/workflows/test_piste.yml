name: Test PISTE API

on:
  workflow_dispatch:  # déclenchement manuel uniquement

jobs:
  test-piste:
    runs-on: ubuntu-latest
    steps:
      - name: Test stratégie via kaliText
        env:
          PISTE_CLIENT_ID: ${{ secrets.PISTE_CLIENT_ID }}
          PISTE_CLIENT_SECRET: ${{ secrets.PISTE_CLIENT_SECRET }}
        run: |
          python3 - << 'EOF'
          import urllib.request, urllib.parse, json, os

          data = urllib.parse.urlencode({
              "grant_type": "client_credentials",
              "client_id": os.environ["PISTE_CLIENT_ID"],
              "client_secret": os.environ["PISTE_CLIENT_SECRET"],
              "scope": "openid",
          }).encode()
          with urllib.request.urlopen(
              urllib.request.Request(
                  "https://oauth.piste.gouv.fr/api/oauth/token",
                  data=data,
                  headers={"Content-Type": "application/x-www-form-urlencoded"}
              ), timeout=15
          ) as r:
              token = json.loads(r.read())["access_token"]

          BASE = "https://api.piste.gouv.fr/dila/legifrance/lf-engine-app"
          H = {
              "Authorization": f"Bearer {token}",
              "Content-Type": "application/json",
              "Accept": "application/json",
          }

          def post(endpoint, payload):
              req = urllib.request.Request(
                  f"{BASE}{endpoint}",
                  data=json.dumps(payload).encode(),
                  headers=H
              )
              with urllib.request.urlopen(req, timeout=20) as r:
                  return json.loads(r.read())

          # 1. Voir la réponse complète de /consult/kaliCont sur SYNTEC
          cont = post("/consult/kaliCont", {"id": "KALICONT000005635173"})
          print("✅ /consult/kaliCont SYNTEC complet:")
          print(json.dumps(cont, indent=2, ensure_ascii=False))

          # 2. Voir ce que donne /consult/kaliText sur un KALITEXT
          # KALITEXT000005679895 = texte de base SYNTEC
          txt = post("/consult/kaliText", {"id": "KALITEXT000005679895"})
          print("\n✅ /consult/kaliText SYNTEC:")
          print(f"  idConteneur={txt.get('idConteneur')}")
          print(f"  clés complètes: {list(txt.keys())}")

          # 3. Paginer 2 pages de /search et voir si on peut extraire idConteneur
          # depuis les résultats (sans appel supplémentaire)
          search = post("/search", {
              "fond": "KALI",
              "recherche": {
                  "champs": [],
                  "operateur": "ET",
                  "pageNumber": 1,
                  "pageSize": 20,
                  "sort": "PERTINENCE",
                  "typePagination": "DEFAUT",
                  "fromAdvancedRecherche": False
              }
          })
          print(f"\n📋 Champs dans results[0]: {list(search['results'][0].keys())}")
          print(f"   idConteneur dans result? {'idConteneur' in search['results'][0]}")
          # Chercher idConteneur dans la structure entière du premier résultat
          txt_result = json.dumps(search['results'][0], ensure_ascii=False)
          if 'idConteneur' in txt_result or 'KALICONT' in txt_result:
              import re
              kaliconts = re.findall(r'KALICONT\d+', txt_result)
              print(f"   KALICONT trouvés: {list(set(kaliconts))[:5]}")
          else:
              print("   Pas de KALICONT dans le résultat search")
          EOF
