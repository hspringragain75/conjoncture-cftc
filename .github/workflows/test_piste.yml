name: Test PISTE API

on:
  workflow_dispatch:  # déclenchement manuel uniquement

jobs:
  test-piste:
    runs-on: ubuntu-latest
    steps:
      - name: Test liste CCN KALI
        env:
          PISTE_CLIENT_ID: ${{ secrets.PISTE_CLIENT_ID }}
          PISTE_CLIENT_SECRET: ${{ secrets.PISTE_CLIENT_SECRET }}
        run: |
          python3 - << 'EOF'
          import urllib.request, urllib.parse, json, os

          data = urllib.parse.urlencode({
              "grant_type": "client_credentials",
              "client_id": os.environ["PISTE_CLIENT_ID"],
              "client_secret": os.environ["PISTE_CLIENT_SECRET"],
              "scope": "openid",
          }).encode()
          with urllib.request.urlopen(
              urllib.request.Request(
                  "https://oauth.piste.gouv.fr/api/oauth/token",
                  data=data,
                  headers={"Content-Type": "application/x-www-form-urlencoded"}
              ), timeout=15
          ) as r:
              token = json.loads(r.read())["access_token"]
          print("✅ Token OK")

          BASE = "https://api.piste.gouv.fr/dila/legifrance/lf-engine-app"

          # Test 1 : recherche KALI sans filtre
          for label, payload in [
              ("KALI sans filtre", {
                  "fond": "KALI",
                  "recherche": {
                      "champs": [],
                      "operateur": "ET",
                      "pageNumber": 1,
                      "pageSize": 5,
                      "sort": "PERTINENCE",
                      "typePagination": "DEFAUT",
                      "fromAdvancedRecherche": False
                  }
              }),
              ("KALI_CONT sans filtre", {
                  "fond": "KALI_CONT",
                  "recherche": {
                      "champs": [],
                      "operateur": "ET",
                      "pageNumber": 1,
                      "pageSize": 5,
                      "sort": "PERTINENCE",
                      "typePagination": "DEFAUT",
                      "fromAdvancedRecherche": False
                  }
              }),
              ("KALI avec NATURE=IDCC", {
                  "fond": "KALI",
                  "recherche": {
                      "champs": [],
                      "filtres": [{"facette": "NATURE", "valeur": "IDCC"}],
                      "operateur": "ET",
                      "pageNumber": 1,
                      "pageSize": 5,
                      "sort": "PERTINENCE",
                      "typePagination": "DEFAUT",
                      "fromAdvancedRecherche": False
                  }
              }),
          ]:
              try:
                  req = urllib.request.Request(
                      f"{BASE}/search",
                      data=json.dumps(payload).encode(),
                      headers={
                          "Authorization": f"Bearer {token}",
                          "Content-Type": "application/json",
                          "Accept": "application/json",
                      }
                  )
                  with urllib.request.urlopen(req, timeout=20) as r:
                      result = json.loads(r.read())
                  total = result.get("totalResultNumber", "?")
                  keys = list(result.keys())
                  print(f"\n✅ {label}: total={total} clés={keys}")
                  if result.get("results"):
                      first = result["results"][0]
                      print(f"   Premier: {json.dumps(first, ensure_ascii=False)[:300]}")
              except urllib.error.HTTPError as e:
                  body = e.read().decode("utf-8", errors="replace")[:200]
                  print(f"\n❌ {label}: HTTP {e.code} — {body}")
              except Exception as e:
                  print(f"\n❌ {label}: {e}")
          EOF
