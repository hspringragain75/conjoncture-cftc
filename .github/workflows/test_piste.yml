name: Test PISTE API

on:
  workflow_dispatch:  # déclenchement manuel uniquement

jobs:
  test-piste:
    runs-on: ubuntu-latest
    steps:
      - name: Test TEXTE_BASE
        env:
          PISTE_CLIENT_ID: ${{ secrets.PISTE_CLIENT_ID }}
          PISTE_CLIENT_SECRET: ${{ secrets.PISTE_CLIENT_SECRET }}
        run: |
          python3 - << 'EOF'
          import urllib.request, urllib.parse, json, os, re

          data = urllib.parse.urlencode({
              "grant_type": "client_credentials",
              "client_id": os.environ["PISTE_CLIENT_ID"],
              "client_secret": os.environ["PISTE_CLIENT_SECRET"],
              "scope": "openid",
          }).encode()
          with urllib.request.urlopen(
              urllib.request.Request(
                  "https://oauth.piste.gouv.fr/api/oauth/token",
                  data=data,
                  headers={"Content-Type": "application/x-www-form-urlencoded"}
              ), timeout=15
          ) as r:
              token = json.loads(r.read())["access_token"]
          print("✅ Token OK")

          BASE = "https://api.piste.gouv.fr/dila/legifrance/lf-engine-app"
          headers = {
              "Authorization": f"Bearer {token}",
              "Content-Type": "application/json",
              "Accept": "application/json",
          }

          def post(endpoint, payload):
              req = urllib.request.Request(
                  f"{BASE}{endpoint}",
                  data=json.dumps(payload).encode(),
                  headers=headers
              )
              try:
                  with urllib.request.urlopen(req, timeout=20) as r:
                      return json.loads(r.read()), None
              except urllib.error.HTTPError as e:
                  return None, f"HTTP {e.code}: {e.read().decode()[:200]}"
              except Exception as e:
                  return None, str(e)

          # Afficher les noms réels des facettes
          result, err = post("/search", {
              "fond": "KALI",
              "recherche": {
                  "champs": [], "operateur": "ET",
                  "pageNumber": 1, "pageSize": 1,
                  "sort": "PERTINENCE", "typePagination": "DEFAUT",
                  "fromAdvancedRecherche": False
              }
          })
          if result:
              print("\n📊 Facettes (noms complets):")
              for facet in (result.get("facets") or []):
                  print(f"  facette complète: {json.dumps(facet, ensure_ascii=False)[:200]}")

          # Tester le filtre TYPE_TEXTE=TEXTE_BASE (textes de base des CCN)
          for facette, valeur in [
              ("TYPE_TEXTE", "TEXTE_BASE"),
              ("NOR", "TEXTE_BASE"),
              ("TEXTE_BASE", "true"),
              ("TEXTE_BASE", "TEXTE_BASE"),
          ]:
              result, err = post("/search", {
                  "fond": "KALI",
                  "recherche": {
                      "champs": [],
                      "filtres": [{"facette": facette, "valeur": valeur}],
                      "operateur": "ET",
                      "pageNumber": 1, "pageSize": 3,
                      "sort": "PERTINENCE", "typePagination": "DEFAUT",
                      "fromAdvancedRecherche": False
                  }
              })
              if result:
                  total = result.get("totalResultNumber")
                  print(f"\n✅ {facette}={valeur}: total={total}")
                  if result.get("results"):
                      t = (result["results"][0].get("titles") or [{}])[0]
                      print(f"   ex id={t.get('id')} title={t.get('title','')[:70]}")
              else:
                  print(f"❌ {facette}={valeur}: {err[:100]}")
          EOF
